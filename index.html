  const spinner = document.getElementById('spinner');
  const status = document.getElementById('statusMsg');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  status.textContent = 'Scoring...';
  document.getElementById('results').style.display = 'none';

  const userMsg = updates
    ? `SESSION UPDATES:\n${updates}\n\nJOB POSTING:\n${posting}`
    : `JOB POSTING:\n${posting}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    const data = await res.json();

    if (data.error) {
      status.textContent = 'API error: ' + data.error.message;
      return;
    }

    const text = data.content?.find(b => b.type === 'text')?.text || '';
    let parsed;
    try {
      parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch {
      status.textContent = 'Parse error. Try again.';
      console.error('Raw response:', text);
      return;
    }

    renderResults(parsed);
    status.textContent = '';

  } catch(e) {
    status.textContent = 'Network error: ' + e.message;
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

function renderResults(d) {
  document.getElementById('results').style.display = 'block';
  document.getElementById('overallScore').textContent = Math.round(d.overall);

  const vbox = document.getElementById('verdictBox');
  if (d.already_applied) {
    vbox.className = 'verdict';
    vbox.style.background = '#f0f0ee';
    vbox.style.color = '#555';
    vbox.textContent = 'Already applied to this role';
  } else if (d.pass) {
    vbox.className = 'verdict verdict-pass';
    vbox.textContent = 'Pass — tailored resume generated';
  } else {
    vbox.className = 'verdict verdict-fail';
    vbox.textContent = 'Below 70% threshold — resume not generated';
  }

  const rows = document.getElementById('dimRows');
  rows.innerHTML = '';
  (d.dimensions || []).forEach(dim => {
    const s = Math.round(dim.score);
    const color = s >= 70 ? '#1a9e6e' : s >= 50 ? '#d4880a' : '#c0392b';
    rows.innerHTML += `
      <div class="dim-block">
        <div class="dim-header">
          <span class="dim-name">${dim.name} <span class="dim-weight">(${dim.weight}%)</span></span>
          <span class="dim-score" style="color:${color}">${s}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${s}%;background:${color}"></div></div>
        <div class="dim-reasoning">${dim.reasoning}</div>
      </div>`;
  });

  const resumeOut = document.getElementById('resumeOut');
  if (d.pass && !d.already_applied && d.resume) {
    resumeOut.textContent = d.resume;
  } else {
    resumeOut.innerHTML = '<span class="no-resume-msg">' + (d.already_applied ? 'Already applied — no new resume needed.' : 'Score below 70% — no resume generated.') + '</span>';
  }

  const stratOut = document.getElementById('strategyOut');
  stratOut.innerHTML = '';
  if (d.strategy) {
    d.strategy.split('\n').filter(l => l.trim()).forEach(line => {
      const div = document.createElement('div');
      div.className = 'strategy-item';
      div.textContent = line.replace(/^[-*]\s*/, '');
      stratOut.appendChild(div);
    });
  }

  showTab('scoring', document.querySelector('.tab'));
}

function showTab(tab, btn) {
  ['scoring','resume','strategy'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function copyResume() {
  const text = document.getElementById('resumeOut').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function clearAll() {
  document.getElementById('jobInput').value = '';
  document.getElementById('updateInput').value = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('statusMsg').textContent = '';
}
</script>
</body>
</html>
